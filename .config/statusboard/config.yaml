# statusboard config
# Place this file as config.yaml next to statusboard.py

title: "My Homelab Status Board"
interval: 30       # seconds between checks
timeout: 10        # request timeout per service
history_len: 20    # how many checks to keep in history sparkline

services:
  - name: "Homepage"
    url: "https://lewegraening.de"

  - name: "API"
    url: "https://yoursite.com/api/health"

  - name: "Login"
    url: "https://yoursite.com/login"

  - name: "Jellyfin"
    url: "http://192.168.21.100:8096"

  - name: "Nextcloud"
    url: "https://cloud.yoursite.com"

  - name: "Gitea"
    url: "https://git.yoursite.com"

  - name: "Uptime Kuma"
    url: "http://192.168.1.100:3001"

  - name: "Pi-hole"
    url: "http://192.168.1.1/admin"
